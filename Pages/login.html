<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="../Styles/great-outdoors.css">
  <link rel="stylesheet" href="../Styles/auth.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <title>Login</title>
</head>
<body>
  <div id="site-nav-container"></div>

<div class="auth-wrapper">

  <svg class="mountains" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" aria-hidden="true">
    <polygon points="0,200 120,60 240,140 380,20 520,110 660,50 800,130 800,200" fill="#2D5016"/>
    <polygon points="0,200 80,100 200,160 320,80 460,150 580,90 720,140 800,100 800,200" fill="#6B8F4E"/>
  </svg>

  <div class="card">
    <div class="card-stripe"></div>

    <div class="card-header">
      <div class="trail-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#2D5016" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L4 20h16L12 2z"/>
          <path d="M12 2v18"/>
          <path d="M8.5 12h7"/>
        </svg>
      </div>

      <div class="card-title">Welcome back, hiker</div>
      <div class="card-sub">Sign in to continue your trail</div>
    </div>

    <div class="field-group">
      <label class="field-label" for="login-email">Email</label>
      <div class="field-wrap">
        <i class="ti ti-mail field-icon"></i>
        <input class="field-input" id="login-email" type="email" placeholder="name@trail.com" />
      </div>
    </div>

    <div class="field-group">
      <div class="field-label-row">
        <label class="field-label" for="login-password">Password</label>
        <a class="forgot-link" href="#">Forgot?</a>
      </div>

      <div class="field-wrap">
        <i class="ti ti-lock field-icon"></i>
        <input class="field-input" id="login-password" type="password" placeholder="••••••••" />
      </div>
    </div>

    <button class="submit-btn" id="submit-btn" onclick="login()">
      <i class="ti ti-compass"></i>
      Return to trail
    </button>

    <!-- <div class="divider">or</div>

    <button class="submit-btn submit-btn--secondary" type="button">
      <i class="ti ti-brand-google"></i>
      Continue with Google
    </button> -->

    <div class="trail-stats">
      <div class="stat-item">
        <span class="stat-val">PNW</span>
        <span class="stat-lbl">Trails</span>
      </div>

      <div class="stat-item">
        <span class="stat-val">Safe</span>
        <span class="stat-lbl">Hikes</span>
      </div>

      <div class="stat-item">
        <span class="stat-val">Wild</span>
        <span class="stat-lbl">Views</span>
      </div>
    </div>

    <p class="signin-link">
      New to the trail? <a href="signup.html">Create an account</a>
    </p>

  </div>
</div>

<script type="module" src="../Scripts/great_outdoors.js"></script>
<script>
  // Source - https://stackoverflow.com/a/155263
// Posted by Steve Paulo, modified by community. See post 'Timeline' for change history
// Retrieved 2026-06-01, License - CC BY-SA 3.0

document.getElementById("login-password")
    .addEventListener("keyup", function(event) {
    event.preventDefault();
    if (event.keyCode === 13) { // press enter to log in
        document.getElementById("submit-btn").click();
    }
});

</script>

</body>
</html>
