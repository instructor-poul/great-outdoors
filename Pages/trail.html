<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Trail</title>
</head>
<body>
  <h1>PLACEHOLDER</h1>

  <p id="status">Loading...</p>
  <div id="content" style="display:none">
    <h1 id="name"></h1>
    <p id="org"></p>
    <p id="type"></p>
    <p id="length"></p>
    <p id="gain"></p>
    <p id="start-elev"></p>
    <p id="est-time"></p>
    <p id="roughness"></p>
    <p id="hours"></p>
    <p id="location"></p>
    <p id="surfaces"></p>
    <p id="biomes"></p>
    <p id="description"></p>
    <div id="images"></div>
    <p id="edited"></p>
    <hr>
    <h3>Comments</h3>
    <div id="comments"></div>
    <div id="comment-form" style="display:none">
      <textarea id="comment-input" rows="3" cols="40" maxlength="1000" placeholder="Write a comment..."></textarea><br>
      <button id="comment-submit">Post</button>
    </div>
    <p id="comment-login">You must be <a href="login.html">logged in</a> to comment.</p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, getDoc, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { query, where, orderBy, addDoc, collection, firebaseConfig, onAuthStateChanged, auth } from "../Scripts/great_outdoors.js";
    //import  from "../Scripts/great_outdoors.js";

    const db = getFirestore(initializeApp(firebaseConfig));

    const id = new URLSearchParams(window.location.search).get("id");
    if (!id) {
      const snapshot = await getDocs(collection(db, "trails"));
      const docs = snapshot.docs;
      if (!docs.length) {
        document.getElementById("status").textContent = "No trails found.";
      } else {
        const random = docs[Math.floor(Math.random() * docs.length)];
        window.location.href = `trail.html?id=${random.id}`;
      }
    }

    else {
      const snap = await getDoc(doc(db, "trails", id));
      if (!snap.exists()) { document.getElementById("status").textContent = "Trail not found."; }

      else {
        const t = snap.data();
        document.title = t.name;
        document.getElementById("status").style.display = "none";
        document.getElementById("content").style.display = "";

        document.getElementById("name").textContent        = t.name;
        document.getElementById("org").textContent         = t.associated_org   ?? "";
        document.getElementById("type").textContent        = "Type: "           + t.trail_type;
        document.getElementById("length").textContent      = "Length: "         + t.length_mi        + " mi";
        document.getElementById("gain").textContent        = "Elevation gain: " + t.elevation_gain   + " ft";
        document.getElementById("start-elev").textContent  = t.start_elev_ft   ? "Starting elev: "  + t.start_elev_ft  + " ft" : "";
        document.getElementById("est-time").textContent    = t.est_time_hr     ? "Est. time: "       + t.est_time_hr    + " hr (±50%)" : "";
        document.getElementById("roughness").textContent   = t.roughness       ? "Roughness: "       + t.roughness      + "/10" : "";
        document.getElementById("hours").textContent       = t.opening_hours   ? "Hours: "           + (t.opening_hours.open + "–" + t.opening_hours.close + " " + (t.opening_hours.notes ?? "")).trim() : "";
        document.getElementById("location").textContent    = t.location        ? "Location: "        + t.location.latitude + ", " + t.location.longitude : "";
        document.getElementById("surfaces").textContent    = t.surfaces?.length ? "Surfaces: "       + t.surfaces.join(", ") : "";
        document.getElementById("biomes").textContent      = t.biomes?.length  ? "Biomes: "          + t.biomes.join(", ") : "";
        document.getElementById("description").textContent = t.description     ?? "";

        if (t.updated_by && t.updated_at) {
          const date = t.updated_at.toDate().toLocaleDateString();
          document.getElementById("edited").textContent = `Last edited by ${t.updated_by} on ${date}`;
        }

        (t.images ?? []).forEach(url => {
          const img = document.createElement("img");
          img.src = url;
          img.width = 300;
          document.getElementById("images").appendChild(img);
        });

        // Add edit button
        const editBtn = document.createElement("a");
        editBtn.textContent = "Edit Trail";
        onAuthStateChanged(auth, (user) => {
          editBtn.href = user
            ? `add_trail.html?edit=${id}`
            : `login.html?redirect=trail.html?id=${id}`;
        });
        document.getElementById("content").prepend(editBtn);


        // Load comments
        const commentsDiv = document.getElementById("comments");
        const q = query(collection(db, "comments"), where("trail_id", "==", id));//, orderBy("created_at", "asc"));
        const commentSnap = await getDocs(q);
        commentSnap.forEach(d => {
          const c = d.data();
          const p = document.createElement("p");
          const date = c.created_at?.toDate().toLocaleDateString() ?? "just now";
          p.textContent = `${c.email} (${date}): ${c.contents}`;
          commentsDiv.appendChild(p);
        });

        // Show form or login prompt
        onAuthStateChanged(auth, (user) => {
          if (user) {
            document.getElementById("comment-form").style.display = "";
            document.getElementById("comment-login").style.display = "none";
            document.getElementById("comment-submit").addEventListener("click", async () => {
              const contents = document.getElementById("comment-input").value.trim();
              if (!contents) return;
              await addDoc(collection(db, "comments"), {
                trail_id:   id,
                uid:        user.uid,
                email:      user.email,
                contents:   contents,
                created_at: serverTimestamp(),
              });
              document.getElementById("comment-input").value = "";
              // Reload comments
              const p = document.createElement("p");
              p.textContent = `${user.email} (just now): ${contents}`;
              commentsDiv.appendChild(p);
            });
          } else {
            document.getElementById("comment-form").style.display = "none";
            document.getElementById("comment-login").style.display = "";
          }
        });
      }
    }
  </script>
</body>
</html>
