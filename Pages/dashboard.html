<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <link rel="stylesheet" href="../Styles/great-outdoors.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>

<div class="dashboard-wrapper">

  <svg class="mountains" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" aria-hidden="true">
    <polygon points="0,200 120,60 240,140 380,20 520,110 660,50 800,130 800,200" fill="#2D5016"/>
    <polygon points="0,200 80,100 200,160 320,80 460,150 580,90 720,140 800,100 800,200" fill="#6B8F4E"/>
  </svg>

  <div class="dashboard-card">
    <div class="card-stripe"></div>

    <div class="dashboard-header">
      <div class="trail-icon">
        <i class="ti ti-mountain"></i>
      </div>

      <h1>Saddle up Buckaroo!</h1>
      <p> Get ready to explore.</p>
    </div>

    <div class="dashboard-info">
      <div class="info-box">
        <i class="ti ti-map-pin"></i>
        <div>
          <h3>Trail Account</h3>
          <p>Your hiking profile is active.</p>
        </div>
      </div>

      <div class="info-box">
        <i class="ti ti-compass"></i>
        <div>
          <h3>Adventure Status</h3>
          <p>Find trails, create trails and much more.</p>
        </div>
      </div>

      <div class="info-box">
        <i class="ti ti-leaf"></i>
        <div>
          <h3>Outdoor Community</h3>
          <p>Stay connected with other PNW hikers.</p>
        </div>
      </div>
    </div>

    <div class="dashboard-stats">
      <div class="stat-item">
        <span class="stat-val">PNW</span>
        <span class="stat-lbl">Region</span>
      </div>

      <div class="stat-item">
        <span class="stat-val">Safe</span>
        <span class="stat-lbl">Planning</span>
      </div>

      <div class="stat-item">
        <span class="stat-val">Wild</span>
        <span class="stat-lbl">Trails</span>
      </div>
    </div>

    <button class="logout-btn" onclick="logout()">
      <i class="ti ti-logout"></i>
      Logout
    </button>
  </div>

</div>

<script type="module" src="../Scripts/great_outdoors.js"></script>

</body>
</html>
