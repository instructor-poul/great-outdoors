<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Trails</title>
    <link rel="stylesheet" href="styles/toplevel.css">

    <style>
        #trail-list {
            display: grid;
            gap: 1rem;
            padding: 1rem;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        }

        .trail-card {
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 1rem;
        }
        .trail-img { width:100%; height:160px; object-fit:cover; border-radius:6px; display:block; }
        .thumbs { display:flex; gap:8px; margin-top:8px; }
        .thumbs img { width:48px; height:48px; object-fit:cover; border-radius:4px; cursor:pointer; border:1px solid #ddd }
    </style>
</head>
<body>

    <h1>All Trails</h1>

    <div id="trail-list"></div>

    <script src="scripts/trail-data.js"></script>
    <script>
        const loadTrailData = () => {
            if (window.TRAILS_DATA) {
                return Promise.resolve(window.TRAILS_DATA);
            }
            return fetch('./data/trails.json').then(response => response.json());
        };

        loadTrailData()
            .then(data => {
                const trailList = document.getElementById('trail-list');

                data.forEach(trail => {
                    const card = document.createElement('div');
                    card.className = 'trail-card';

                    // main image
                    const img = document.createElement('img');
                    img.className = 'trail-img';
                    img.src = trail.scenery_photo_url || 'images/outdoors.jpg';
                    img.alt = trail.name;
                    img.onerror = () => { img.style.display = 'none'; };

                    // basic info
                    const info = document.createElement('div');
                    info.innerHTML = `
                        <h2>${trail.name}</h2>
                        <p><strong>Location:</strong> ${trail.location}</p>
                        <p><strong>Distance:</strong> ${trail.distance_mi} mi</p>
                        <p><strong>Elevation Gain:</strong> ${trail.elevation_gain_ft} ft</p>
                        <p><strong>Difficulty:</strong> ${trail.difficulty}</p>
                        <p><strong>Estimated Time:</strong> ${trail.estimated_time}</p>
                    `;

                    card.appendChild(img);
                    card.appendChild(info);

                    // gallery thumbnails (if available)
                    if (Array.isArray(trail.gallery) && trail.gallery.length) {
                        const thumbs = document.createElement('div');
                        thumbs.className = 'thumbs';
                        trail.gallery.forEach(src => {
                            const t = document.createElement('img');
                            t.src = src;
                            t.alt = trail.name + ' thumbnail';
                            t.onerror = () => t.style.display = 'none';
                            t.addEventListener('click', () => { img.src = src; img.style.display = 'block'; });
                            thumbs.appendChild(t);
                        });
                        card.appendChild(thumbs);
                    }

                    trailList.appendChild(card);
                });
            })
            .catch(error => {
                console.error('Failed to load trails.json', error);
                const trailList = document.getElementById('trail-list');
                trailList.innerHTML = '<p>Unable to load trail data. If you opened this file directly, run a local server to allow fetch requests.</p>';
            });
    </script>

</body>
</html>
