<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNW - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div id="wrapper">
        <nav id="main-nav">
            <ul>
                <a href="index.html"><li class="nav-logo"><img id="header" src="../images/logo.png" alt="header-logo"></li></a>
                <div class="nav-links">
                    <li><a href="">Trails</a></li>
                    <li><a href="">Safety</a></li>
                    <li><a href="">Community</a></li>
                </div>
            </ul>
        </nav>

        <section>
            <h1>Welcome to Pacific Northwest Hiking!</h1>
        </section>

        <div class="row2">
            <div class="inside-row2">
        <form action="" method="post">
            <img src="../images/logo.png" alt="logo">
            <label for="uname">Username or Email:</label>
            <input type="text" placeholder="Enter Username or Email" name="uname" required>

            <label for="pass">Password:</label>
            <input type="password" placeholder="Enter Password" name="pass" required>

            <input type="button" name="loginbtn" value="Login">

            <label for="rmbr"><input type="checkbox" name="remember">Remember Me</label>

            <span><a href="">Forget Password?</a></span>
            <span>Don't Have an account?<a href="">Sign Up</a></span>
        </form>

             </div>   
        </div>

        <footer>
            <ul>
                <li>All Rights Reserved</li>
                <li>Copyright &copy; 2026</li>
                <li class="footer-socials">
                    <a href="">Facebook</a>
                    <a href="">Twitter</a>
                    <a href="">Instagram</a>
                </li>
            </ul>
        </footer>
    </div>
    
</body>
</html>
