<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hiking Guides — PNW Trails</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles/guides.css"/>
</head>
<body>

<!-- ── NAV ── -->
<nav>
  <div class="nav-logo"><span>🌲</span> PNW Trails</div>
  <ul class="nav-links">
    <li><a href="#">Home</a></li>
    <li><a href="#" class="active">Guides</a></li>
    <li><a href="#">Map</a></li>
    <li><a href="#">Community</a></li>
  </ul>
  <div class="nav-search">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" placeholder="Search trails…" aria-label="Search trails"/>
  </div>
</nav>

<!-- ── HERO ── -->
<header class="hero">
  <h1>Hiking Guides</h1>
  <p>Explore trails across the Pacific Northwest — step by step.</p>
</header>

<!-- ── FILTERS ── -->
<div class="filter-bar" role="group" aria-label="Filter guides by difficulty">
  <span class="filter-label">Filter:</span>
  <button class="chip active" onclick="filterCards('all', this)">All</button>
  <button class="chip" onclick="filterCards('easy', this)">🟢 Easy</button>
  <button class="chip" onclick="filterCards('moderate', this)">🟠 Moderate</button>
  <button class="chip" onclick="filterCards('hard', this)">🔴 Hard</button>
</div>

<!-- ── MAIN ── -->
<main>
  <div class="section-header">
    <h2 class="section-title">All Guides</h2>
    <span class="section-count" id="guide-count">Loading…</span>
  </div>

  <!-- Cards are injected here by guides.js — do not add cards manually -->
  <div class="guides-grid" id="guides-grid"></div>

</main>

<script src="scripts/guides.js"></script>

</body>
</html>
