<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trail Comparison | The Great Outdoors</title>
  <link rel="stylesheet" type="text/css" href="styles/toplevel.css" />
  <link rel="stylesheet" type="text/css" href="styles/compare.css" />
</head>
<body>

  <header class="cmp-header">
    <a href="index.html" class="cmp-back">&#8592; Back to Trails</a>
    <h1 class="cmp-title">Trail Comparison</h1>
    <p class="cmp-subtitle">Select two trails to compare side-by-side</p>
  </header>

  <main class="cmp-main">

    <!-- Trail selectors -->
    <section class="cmp-selectors" aria-label="Trail selection">
      <div class="cmp-selector-card" id="selector-a">
        <label for="trail-a" class="cmp-selector-label">Trail A</label>
        <select id="trail-a" class="cmp-select" aria-label="Select first trail">
          <option value="">-- Choose a trail --</option>
        </select>
      </div>

      <div class="cmp-vs" aria-hidden="true">VS</div>

      <div class="cmp-selector-card" id="selector-b">
        <label for="trail-b" class="cmp-selector-label">Trail B</label>
        <select id="trail-b" class="cmp-select" aria-label="Select second trail">
          <option value="">-- Choose a trail --</option>
        </select>
      </div>
    </section>

    <!-- Comparison table -->
    <section class="cmp-table-wrapper" id="comparison-section" aria-live="polite">
      <div class="cmp-placeholder" id="cmp-placeholder">
        <span class="cmp-placeholder-icon">🥾</span>
        <p>Pick two trails above to see how they stack up.</p>
      </div>

      <table class="cmp-table" id="cmp-table" hidden aria-label="Trail comparison">
        <thead>
          <tr>
            <th class="cmp-th-metric" scope="col">Metric</th>
            <th class="cmp-th-trail" id="th-trail-a" scope="col">Trail A</th>
            <th class="cmp-th-trail" id="th-trail-b" scope="col">Trail B</th>
          </tr>
        </thead>
        <tbody id="cmp-tbody">
          <!-- Rows injected by JS -->
        </tbody>
      </table>
    </section>

  </main>

  <footer class="cmp-footer">
    <a href="index.html">&#8592; The Great Outdoors Home</a>
  </footer>

  <script src="scripts/compare.js"></script>
</body>
</html>
